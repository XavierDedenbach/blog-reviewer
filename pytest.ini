[tool:pytest]
# Test discovery
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Async support
asyncio_mode = auto

# Coverage configuration
addopts = 
    --strict-markers
    --strict-config
    --cov=api
    --cov=core
    --cov=cli
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --cov-fail-under=70
    -v
    --tb=short

# Markers for test categorization
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (require services)
    e2e: End-to-end tests (full system)
    slow: Slow running tests
    docker: Tests requiring Docker services
    mongodb: Tests requiring MongoDB

# Minimum versions
minversion = 8.0

# Filter warnings
filterwarnings =
    error
    ignore::UserWarning
    ignore::DeprecationWarning:pymongo.*
    ignore::DeprecationWarning:langchain.*

# Test timeout (10 minutes for integration tests)
timeout = 600

# Parallel execution
--numprocesses = auto